<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 32" role="img" aria-label="FlitzWeb">
  <!-- Wordmark uses Syne; falls back to a system sans if Syne isn't installed.
       Ask FlitzWeb's designer to outline the text for a fully portable file. -->
  <defs>
    <linearGradient id="flitzBolt" x1="6" y1="4" x2="26" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F5BFF"/>
      <stop offset="1" stop-color="#FF5B34"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0C0E1A"/>
  <path d="M18 5 8 18h6l-2 9 12-14h-7l1-8z" fill="url(#flitzBolt)"/>
  <text x="42" y="23" font-family="Syne, 'Segoe UI', Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="-0.6">
    <tspan fill="#0C0E1A">Flitz</tspan><tspan fill="#2F5BFF">Web</tspan>
  </text>
</svg>
